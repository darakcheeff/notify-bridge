name: Build Flutter Mobile App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Android Project
        run: |
          rm -rf android
          flutter create --platforms android --org com.notify.bridge .
          cp custom_manifest.xml android/app/src/main/AndroidManifest.xml
          cp proguard-rules.pro android/app/proguard-rules.pro
          
          # Write patching script to a temporary file
          cat << 'EOF' > patch_gradle.py
          import os
          path = 'android/app/build.gradle.kts'
          if not os.path.exists(path):
              print(f'Error: {path} not found')
              exit(1)

          with open(path, 'r') as f:
              lines = f.readlines()

          new_lines = []
          for line in lines:
              # 1. Update minSdk to 23
              if 'minSdk =' in line:
                  line = line.split('=')[0] + '= 23\n'
              
              new_lines.append(line)
              
              # 2. Add Proguard rules config inside release block
              if 'release {' in line:
                  new_lines.append('            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")\n')
              
              # 2.1 Exclude Firebase/GMS (for Non-GMS devices)
              if 'android {' in line:
                  new_lines.append('    configurations.all {\n')
                  new_lines.append('        exclude(group = "com.google.firebase")\n')
                  new_lines.append('        exclude(group = "com.google.android.gms")\n')
                  new_lines.append('    }\n')
              
              # 2.2 Fix Namespace for old plugins (e.g. qr_code_scanner)
              if 'defaultConfig {' in line:
                  new_lines.append('    namespace = "com.notify.bridge.notification_bridge"\n')

              # 3. Inject desugaring into compileOptions
              if 'compileOptions {' in line:
                  new_lines.append('        isCoreLibraryDesugaringEnabled = true\n')

          content = ''.join(new_lines)

          # 4. Add dependencies block with desugar lib
          desugar_dep = '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if 'dependencies {' not in content:
              content += f'\ndependencies {{\n{desugar_dep}\n}}\n'
          else:
              # Insert at the beginning of the dependencies block
              content = content.replace('dependencies {', f'dependencies {{\n{desugar_dep}')

          with open(path, 'w') as f:
              f.write(content)
          print('--- Patched build.gradle.kts ---')
          print(content)
          EOF

          python3 patch_gradle.py

      - name: Install dependencies
        run: flutter pub add flutter_local_notifications uuid app_links qr_flutter installed_apps shared_preferences flutter_notification_listener mqtt_client device_info_plus qr_code_scanner permission_handler

      - name: Patch Plugin Namespaces & JVM
        run: |
          find /home/runner/.pub-cache -name "build.gradle" -path "*/qr_code_scanner*/android/*" -exec sed -i '/android {/a \    namespace "net.touchcapture.qr.flutterqr"\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n    kotlinOptions {\n        jvmTarget = "17"\n    }' {} +

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-bridge-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
