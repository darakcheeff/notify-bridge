name: Build Flutter Mobile App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Android Project
        run: |
          rm -rf android
          flutter create --platforms android --org com.notify.bridge .
          cp custom_manifest.xml android/app/src/main/AndroidManifest.xml
          # Enable core library desugaring required by flutter_local_notifications >= 9
          # and set minSdk to 23 (required by flutter_notification_listener)
          BUILD_GRADLE="android/app/build.gradle"
          # Set minSdkVersion to 23
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$BUILD_GRADLE"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' "$BUILD_GRADLE"
          # Add coreLibraryDesugaringEnabled
          sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' "$BUILD_GRADLE"
          # Add desugar_jdk_libs dependency
          sed -i '/dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' "$BUILD_GRADLE"
          echo "--- Patched build.gradle ---"
          cat "$BUILD_GRADLE"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-bridge-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
