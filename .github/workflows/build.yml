name: Build Flutter Mobile App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Android Project
        run: |
          rm -rf android
          flutter create --platforms android --org com.notify.bridge .
          cp custom_manifest.xml android/app/src/main/AndroidManifest.xml
          # Flutter now generates Kotlin DSL (.kts) gradle files
          BUILD_GRADLE="android/app/build.gradle.kts"
          echo "--- Original build.gradle.kts ---"
          cat "$BUILD_GRADLE"
          # Set minSdk to 23 (flutter_notification_listener requirement)
          sed -i 's/minSdk = .*/minSdk = 23/' "$BUILD_GRADLE"
          # Enable core library desugaring (flutter_local_notifications v21 requirement)
          sed -i '/compileOptions {/a \        isCoreLibraryDesugaringEnabled = true' "$BUILD_GRADLE"
          # Add desugar dependency (Kotlin DSL syntax uses double-quotes)
          # We use a more flexible regex for the dependencies block
          sed -i '/dependencies {/a \    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' "$BUILD_GRADLE"
          echo "--- Patched build.gradle.kts ---"
          cat "$BUILD_GRADLE"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-bridge-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
